services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - db_data_v2_python:/var/lib/postgresql/data

  backend:
    build: ./backend-python
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/app
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - db
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:3001/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data_v2_python:
